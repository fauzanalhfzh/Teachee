services:
  db:
    image: postgres:15-alpine
    container_name: teachee_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: quiz_db
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  flux:
    build:
      context: .
      dockerfile: Dockerfile.flux
    container_name: teachee_flux
    restart: always
    command: uvicorn flux_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"
    networks:
      - teachee-vllm
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    security_opt:
      - seccomp:unconfined
    environment:
      - FLUX_MODEL=black-forest-labs/FLUX.1-dev
      - HF_TOKEN=${HF_TOKEN}
      - HIP_VISIBLE_DEVICES=0
      - HSA_ENABLE_SDMA=0

  web:
    build: .
    container_name: teachee_webapp
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      - db
    networks:
      - default
      - teachee-vllm
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/quiz_db
      - AI_PROVIDER=vllm
      - VLLM_URL=http://rocm:8000/v1
      - VLLM_MODEL=Qwen3-30B-A3B
      - JWT_SECRET_KEY=d3aea72647a1f9847954e1e745e3d878c86482d4dab9d01b52a910f92243ddac
      - FLUX_URL=http://flux:8000

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  pgdata:

networks:
  teachee-vllm:
    external: true
